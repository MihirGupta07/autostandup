services:
  - type: web
    name: autostandup
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: autostandup-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITLAB_CLIENT_ID
        sync: false
      - key: GITLAB_CLIENT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STANDUP_CRON
        value: 0 9 * * 1-5

databases:
  - name: autostandup-db
    plan: free
    databaseName: autostandup
    user: autostandup
